<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QK Nail Art</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --cream: #f5f0e8;
    --cream-dark: #ede6d6;
    --gold: #c9a96e;
    --gold-light: #e8d5b0;
    --brown: #7a6248;
    --brown-light: #a08060;
    --text: #4a3c2e;
    --text-light: #8a7560;
  }
  body {
    background-color: var(--cream);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    font-family: 'Noto Serif TC', serif;
    color: var(--text);
    padding: 40px 20px 60px;
  }
  .container {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: fadeUp 0.8s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .avatar-wrap {
    margin-bottom: 20px;
    position: relative;
  }
  .avatar-ring {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    padding: 5px;
    background: var(--cream);
    box-shadow: 0 4px 24px rgba(201,169,110,0.2);
  }
  .avatar-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    overflow: hidden;
    background: #8b7355;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .avatar-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .avatar-badge {
    position: absolute;
    bottom: 2px;
    right: 2px;
    width: 26px;
    height: 26px;
    background: var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    border: 2px solid var(--cream);
  }
  .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 300;
    letter-spacing: 3px;
    color: var(--brown);
    margin-bottom: 8px;
    text-align: center;
  }
  .tagline {
    font-size: 12px;
    color: var(--text-light);
    letter-spacing: 1.5px;
    margin-bottom: 28px;
    text-align: center;
    font-weight: 300;
  }
  .divider {
    width: 40px;
    height: 1px;
    background: var(--gold);
    margin-bottom: 28px;
    opacity: 0.6;
  }
  .section-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--brown-light);
    text-transform: uppercase;
    margin-bottom: 12px;
    align-self: flex-start;
    font-family: 'Cormorant Garamond', serif;
  }
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 24px;
  }
  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: white;
    border: 1px solid rgba(201,169,110,0.25);
    border-radius: 14px;
    padding: 13px 16px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.25s ease;
    box-shadow: 0 2px 12px rgba(122,98,72,0.06);
    cursor: pointer;
  }
  .link-btn:hover {
    border-color: var(--gold);
    box-shadow: 0 4px 20px rgba(201,169,110,0.18);
    transform: translateY(-1px);
  }
  .link-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .icon-ig { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
  .icon-line { background: #06C755; }
  .icon-course { background: linear-gradient(135deg, var(--gold-light), var(--gold)); }
  .icon-qa { background: linear-gradient(135deg, #e8ddd0, #d4c4b0); }
  .icon-map { background: linear-gradient(135deg, #b8d4e8, #8ab8d4); }
  .icon-booking { background: linear-gradient(135deg, #d4e8d0, #a8d4a0); }
  .link-text {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .link-title {
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: 0.5px;
  }
  .link-sub {
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: 0.3px;
  }
  .link-arrow {
    margin-left: auto;
    color: var(--gold);
    font-size: 18px;
    opacity: 0.7;
  }

  /* Map section */
  .map-section {
    width: 100%;
    margin-bottom: 24px;
  }
  .map-container {
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(201,169,110,0.25);
    box-shadow: 0 2px 12px rgba(122,98,72,0.06);
    background: white;
  }
  .map-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 13px 16px;
    border-bottom: 1px solid rgba(201,169,110,0.15);
  }
  .map-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: linear-gradient(135deg, #b8d4e8, #8ab8d4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .map-info { display: flex; flex-direction: column; gap: 2px; }
  .map-title { font-size: 14px; font-weight: 400; color: var(--text); letter-spacing: 0.5px; }
  .map-addr { font-size: 11px; color: var(--text-light); letter-spacing: 0.3px; }
  .map-link-btn {
    margin-left: auto;
    font-size: 11px;
    color: var(--gold);
    text-decoration: none;
    border: 1px solid var(--gold-light);
    border-radius: 20px;
    padding: 4px 10px;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .map-link-btn:hover { background: var(--gold-light); }
  .map-embed {
    width: 100%;
    height: 200px;
    border: none;
    display: block;
  }

  .footer {
    margin-top: 8px;
    font-size: 10px;
    color: var(--text-light);
    letter-spacing: 2px;
    text-align: center;
    opacity: 0.5;
  }

  .link-btn:nth-child(1) { animation: fadeUp 0.6s 0.1s ease both; }
  .link-btn:nth-child(2) { animation: fadeUp 0.6s 0.18s ease both; }
  .link-btn:nth-child(3) { animation: fadeUp 0.6s 0.26s ease both; }
  .link-btn:nth-child(4) { animation: fadeUp 0.6s 0.34s ease both; }
  .link-btn:nth-child(5) { animation: fadeUp 0.6s 0.42s ease both; }
</style>
</head>
